name: OnDeck CI

on:
  push:
    branches:
      - preDeck
      - master
  pull_request:

jobs:
  frontend:
    name: Frontend Install and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  backend:
    name: Backend Install and Import Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-minimal.txt

      - name: Install dependencies
        run: pip install -r requirements-minimal.txt

      - name: Import check
        run: python -c "from app.main import app; print(app.title)"

      - name: Bytecode compile check
        run: python -m compileall app
