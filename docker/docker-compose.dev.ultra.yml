# template ultra development overrides (prebuilt base images)

services:
  frontend:
    image: ${PROJECT_SLUG:-fulldock-core}-frontend-base:latest
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - template_frontend_node_modules:/app/node_modules
      - /app/.next
    env_file:
      - ../.env.development
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_ADMIN_NAME=${ADMIN_NAME:-Admin}
      - NEXT_PUBLIC_ADMIN_ROLE=Administrator
      - NEXT_PUBLIC_ADMIN_INITIALS=${ADMIN_INITIALS:-A}
      - NEXT_PUBLIC_ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - NEXT_PUBLIC_DEV_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - NEXT_PUBLIC_PROJECT_DISPLAY_NAME=OnDeck 2.0.0
      - NEXT_PUBLIC_PROJECT_DESCRIPTION=High-fidelity prompt queue management system
    command: sh -c "npm run dev"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    image: ${PROJECT_SLUG:-fulldock-core}-backend-base:latest
    command: >
      sh -c '
        echo "[INFO] Ultra startup - running migrations..." &&
        /app/scripts/migrate.sh &&
        echo "[INFO] Starting server with hot reload..." &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      '
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ../backend/.env:/app/.env:ro
    env_file:
      - ../.env.development
    environment:
      - PYTHONPATH=/app
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=${POSTGRES_DB:-template}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  template_frontend_node_modules:
