# {{PROJECT_NAME}} ultra development overrides
# Use with: docker compose -f ../../vadimOS/docker/docker-compose.base.yml -f docker-compose.yml -f ../../vadimOS/docker/docker-compose.dev.ultra.yml -f docker-compose.dev.ultra.yml

services:
  # Override for pre-built images
  frontend:
    image: {{PROJECT_NAME}}-frontend-base:latest
    environment:
      - NEXT_PUBLIC_ADMIN_NAME={{ADMIN_NAME}}
      - NEXT_PUBLIC_ADMIN_ROLE={{ADMIN_ROLE}}
      - NEXT_PUBLIC_ADMIN_INITIALS={{ADMIN_INITIALS}}
      
  api:
    image: {{PROJECT_NAME}}-backend-base:latest
    env_file:
      - /Users/vadimcastro/Desktop/PROJECTS/{{PROJECT_NAME}}/.env.development
    volumes:
      - ../backend/.env:/app/.env:ro
    environment:
      - POSTGRES_DB={{PROJECT_NAME}}

volumes:
  {{PROJECT_NAME}}_frontend_node_modules: