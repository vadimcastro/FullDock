# {{PROJECT_NAME}} ultra development overrides
# Use with: docker compose -f ../../vadimOS/docker/docker-compose.base.yml -f docker-compose.yml -f ../../vadimOS/docker/docker-compose.dev.ultra.yml -f docker-compose.dev.ultra.yml

services:
  # Override for pre-built images
  frontend:
    image: template-frontend-base:latest
    volumes:
      - /Users/vadimcastro/Desktop/PROJECTS/vadim-project-template/frontend:/app
      - template_frontend_node_modules:/app/node_modules
      - /app/.next
    env_file:
      - /Users/vadimcastro/Desktop/PROJECTS/vadim-project-template/.env.development
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_ADMIN_NAME={{ADMIN_NAME}}
      - NEXT_PUBLIC_ADMIN_ROLE=Administrator
      - NEXT_PUBLIC_ADMIN_INITIALS={{ADMIN_INITIALS}}
      - NEXT_PUBLIC_ADMIN_EMAIL=${vadimOS_DEFAULT_ADMIN_EMAIL}
      - NEXT_PUBLIC_DEV_PASSWORD=${vadimOS_DEFAULT_DEV_PASSWORD}
      
  api:
    image: template-backend-base:latest
    volumes:
      - /Users/vadimcastro/Desktop/PROJECTS/vadim-project-template/backend:/app
    env_file:
      - /Users/vadimcastro/Desktop/PROJECTS/vadim-project-template/.env.development
    environment:
      - POSTGRES_DB=template
      - PYTHONPATH=/app
    working_dir: /app

volumes:
  template_frontend_node_modules: