# docker/docker-compose.prod.yml
# OnDeck 2.1.7 — production stack

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile.prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${API_URL:-https://api.yourdomain.com}
      - NEXT_PUBLIC_PROJECT_DISPLAY_NAME=OnDeck 2.1.7
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
        GIT_COMMIT_HASH: ${GIT_COMMIT_HASH:-unknown}
    command: >
      sh -c '
        /app/scripts/migrate.sh &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      '
    ports:
      - "8000:8000"
    env_file:
      - ../.env.production.local
    environment:
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    env_file:
      - ../.env.production.local
    volumes:
      - ondeck_postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - ondeck_redis_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  ondeck_postgres_prod:
  ondeck_redis_prod:
