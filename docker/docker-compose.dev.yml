# {{PROJECT_NAME}} development overrides
# Use with: docker compose -f ../../vadimOS/docker/docker-compose.base.yml -f docker-compose.yml -f ../../vadimOS/docker/docker-compose.dev.yml -f docker-compose.dev.yml

services:
  frontend:
    env_file:
      - ../.env.development
    environment:
      - NEXT_PUBLIC_ADMIN_NAME={{ADMIN_NAME}}
      - NEXT_PUBLIC_ADMIN_ROLE={{ADMIN_ROLE}}
      - NEXT_PUBLIC_ADMIN_INITIALS={{ADMIN_INITIALS}}
      - NEXT_PUBLIC_ADMIN_EMAIL=${vadimOS_DEFAULT_ADMIN_EMAIL}
      - NEXT_PUBLIC_DEV_PASSWORD=${vadimOS_DEFAULT_DEV_PASSWORD}
      - NEXT_PUBLIC_PROJECT_DISPLAY_NAME=Template Project
      - NEXT_PUBLIC_PROJECT_DESCRIPTION=vadim-project-template development environment
      
  api:
    env_file:
      - ../.env.development
    volumes:
      - ../backend/.env:/app/.env:ro