# docker/docker-compose.dev.fast.yml
# Optimized development compose for faster startup
services:
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - template_frontend_node_modules:/app/node_modules
      - /app/.next
    environment:
      - PYTHONPATH=/app:/app/app
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_ADMIN_NAME=${ADMIN_NAME:-Admin}
      - NEXT_PUBLIC_ADMIN_ROLE=${ADMIN_ROLE:-Administrator}
      - NEXT_PUBLIC_ADMIN_INITIALS=${ADMIN_INITIALS:-A}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
      
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - APP_PATH=backend/app
    command: >
      sh -c '
        echo "[INFO] Fast startup - running migrations..." &&
        /app/scripts/migrate.sh &&
        echo "[INFO] Starting server with hot reload..." &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      '
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=${POSTGRES_DB:-template}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ../.env.development
    ports:
      - "8000:8000"  
    volumes:
      - ../backend:/app
      - ../backend/.env:/app/.env:ro

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
        
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=${POSTGRES_DB:-template}
    ports:
      - "5432:5432"
    volumes:
      - template_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 5s
      
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --save ""
    ports:
      - "6379:6379"
    volumes:
      - template_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 2
      start_period: 3s

volumes:
  template_postgres_data:
  template_redis_data:
  template_frontend_node_modules:
