# HTTPS Production Configuration
version: '3.8'
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    env_file:
      - ../.env.production.local
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.{{DOMAIN_NAME}}
    # No port exposure - accessed through nginx
    restart: unless-stopped

  api:
    build:
      dockerfile: docker/Dockerfile
      context: ..
    command: >
      sh -c '
        echo "Running migrations..." &&
        /app/scripts/migrate.sh &&
        echo "Waiting for tables to be ready..." &&
        sleep 5 &&
        echo "Initializing database..." &&
        python3 /app/scripts/init_db.py || echo "Database init failed, continuing..." &&
        echo "Starting server..." &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      '
    # No port exposure - accessed through nginx
    env_file:
      - ../.env.production.local
    environment:
      - PYTHONPATH=/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15
    env_file:
      - ../.env.production.local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:6
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
